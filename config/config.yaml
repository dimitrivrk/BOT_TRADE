# =============================================================================
# BOT TRADING CONFIG v4 - CRYPTO AI BOT (State of the Art 2025-2026)
# Nouveautes v4:
#   - Reward RL multi-objectif (DSR + drawdown + CVaR)
#   - Env RL avec 10 portfolio state features
#   - On-chain features (funding rate, OI, Fear&Greed, taker ratio)
#   - Predictions multi-horizon Mamba pour SL/TP dynamiques
#   - Meta-learner adaptatif pour les poids de l'ensemble
#   - Trailing stop + partial TP + regime-adaptive SL/TP
# =============================================================================

# =============================================================================
# DISCORD NOTIFICATIONS
# =============================================================================
discord:
  webhook_url: "https://discord.com/api/webhooks/1482817674852565272/FccpSX6u9HV3XcXidJaduusud0tAbYuFYN_vVZP4t2-L8p4Zt4h2hJa64tq6ZSx2UxrU"
  status_interval_minutes: 60      # status periodique toutes les X minutes

# =============================================================================
exchange:
  name: "binance"           # binance | bybit | kraken | okx
  sandbox: true            # true = testnet (IMPORTANT: mettre false en prod)
  rate_limit: true
  timeout: 30000

trading:
  pairs:
    - "BTC/USDT"
  base_currency: "USDT"
  timeframes:
    primary: "1h"          # timeframe principal pour les signaux
    higher: "4h"           # confirmation higher timeframe
    lower: "15m"           # entree precise lower timeframe
  market_type: "futures"   # spot | futures
  leverage: 3              # levier max (1 = pas de levier)

capital:
  total_usdt: 10000.0
  max_position_pct: 0.15   # 15% max par position
  max_drawdown_pct: 0.20   # stoppe le bot si DD > 20%
  risk_per_trade_pct: 0.01 # risque 1% du capital par trade (Kelly)

data:
  historical_days: 730     # 2 ans d'historique
  warmup_candles: 200      # bougies de chauffe indicateurs
  storage: "sqlite"
  db_path: "data/storage/market_data.db"
  cache_dir: "data/cache"

features:
  indicators:
    trend:
      - name: "EMA"
        periods: [9, 21, 50, 200]
      - name: "SMA"
        periods: [20, 50]
      - name: "VWAP"
      - name: "SuperTrend"
        atr_period: 10
        multiplier: 3.0
    momentum:
      - name: "RSI"
        period: 14
      - name: "MACD"
        fast: 12
        slow: 26
        signal: 9
      - name: "Stochastic"
        k: 14
        d: 3
      - name: "MFI"
        period: 14
    volatility:
      - name: "BollingerBands"
        period: 20
        std: 2.0
      - name: "ATR"
        period: 14
      - name: "KeltnerChannels"
        period: 20
    volume:
      - name: "OBV"
      - name: "VWMA"
        period: 20
      - name: "CMF"
        period: 20
    patterns:
      - name: "CandlePatterns"

  advanced:
    orderbook_depth: 10
    funding_rate: true
    open_interest: true
    liquidations: true
    fear_greed_index: true

  lookback_windows: [5, 10, 20, 50, 100]
  normalization: "rolling_zscore"
  onchain_enabled: true          # features on-chain: funding rate, OI, Fear&Greed, etc.

models:
  # --- CryptoMamba (SSM - remplace TFT) ---
  mamba:
    enabled: true
    d_model: 128          # dimension du modele SSM
    n_layers: 4           # nombre de C-Blocks
    d_state: 16           # dimension de l'etat SSM
    d_conv: 4             # taille du noyau convolutif
    dropout: 0.1
    horizon: 6            # predire 6 pas en avant (6h)
    lookback: 168         # fenetre d'encodage (1 semaine en 1h)
    batch_size: 128
    max_epochs: 50
    learning_rate: 5e-4
    weight_decay: 1e-5
    scheduler: "cosine"
    gradient_clip: 1.0
    checkpoint_dir: "checkpoints/mamba"

  # --- TFT (fallback si Mamba non disponible) ---
  tft:
    enabled: false         # desactive par defaut (Mamba le remplace)
    hidden_size: 64
    lstm_layers: 1
    num_attention_heads: 4
    dropout: 0.1
    horizon: 6
    encoder_steps: 168
    batch_size: 128
    max_epochs: 30
    learning_rate: 1e-3
    checkpoint_dir: "checkpoints/tft"

  # --- Reinforcement Learning v4 (Ensemble SAC + PPO + DDPG) ---
  rl:
    enabled: true
    train_start_date: "2023-01-01"   # Filtrer les données d'entraînement
    train_end_date: "2025-12-31"     # S'entraîner sur 2023-2024-2025
    # Ensemble complet : SAC + PPO + DDPG
    ensemble_agents:
      - "SAC"              # Meilleur en haute volatilite (max-entropy)
      - "PPO"              # Le plus stable et robuste
      - "DDPG"             # Le plus rapide, bon pour trends clairs
    # Params communs
    learning_rate: 3e-4    # v6: standard SAC/PPO lr (override dans le code)
    gamma: 0.99            # v6: 0.99 avec reward simple (log return)
    buffer_size: 200000    # 200k (données récentes)
    learning_starts: 2000
    tau: 0.005
    total_timesteps: 150000  # SOTA: 150k (Sharpe stabilise à ~100k, au-delà = overfit)
    lookback: 48             # v5: 48 candles = 2 jours (plus de contexte)
    checkpoint_dir: "checkpoints/rl"
    n_envs: 24               # envs paralleles (SubprocVecEnv)
    eval_freq: 500           # SOTA: eval fréquent (~12k steps) pour capturer le best model tôt
    n_eval_episodes: 3       # 3 episodes d'eval
    feature_extractor: "ssm" # ssm = Conv1D multi-scale + temporal attention
    env:
      initial_balance: 10000
      max_position_pct: 0.5
      transaction_cost: 0.001
      reward_type: "risk_aware"
      lookback: 48           # v5: doit matcher le lookback du RL
      cvar_alpha: 0.05       # 5% tail risk pour CVaR
      cvar_lambda: 0.2       # poids de la penalite CVaR
      max_episode_length: 2000  # v5: episodes de ~83 jours max

  # --- Feature Selection (XGBoost) ---
  feature_selection:
    enabled: true
    method: "xgboost"      # xgboost | mutual_info | correlation
    n_features: 30         # nombre de features a garder
    correlation_threshold: 0.95  # supprimer features correlees > 95%
    cache_dir: "checkpoints/feature_selection"

  # --- Ensemble v4 (Mamba + RL + Technique + Meta-learner) ---
  # Apres entrainement Mamba: mettre mamba_weight a 0.35, rl_weight a 0.40
  # Le meta-learner adaptatif overridera ces poids apres 5+ predictions
  ensemble:
    enabled: true
    method: "weighted"     # weighted | voting
    mamba_weight: 0.35     # Mamba entrainé (val_loss=-0.058)
    rl_weight: 0.40        # RL Ensemble = signal principal
    technical_weight: 0.25 # signaux techniques = confirmation
    confidence_threshold: 0.60  # v5: seuil abaissé (plus d'opportunités, mamba compense)

backtesting:
  engine: "vectorbt"
  start_date: "2024-07-01"
  end_date: "2024-12-31"
  initial_capital: 10000.0
  commission: 0.001
  slippage: 0.0005
  metrics:
    - "total_return"
    - "sharpe_ratio"
    - "sortino_ratio"
    - "max_drawdown"
    - "calmar_ratio"
    - "win_rate"
    - "profit_factor"
    - "expectancy"
  walk_forward:
    enabled: true
    train_months: 6
    test_months: 1

risk:
  stop_loss:
    method: "atr"
    atr_multiplier: 2.0
  take_profit:
    method: "rr_ratio"
    rr_ratio: 2.5
  # Trailing stop : suit le prix en faveur, se declenche apres 1x RR de profit
  trailing_stop:
    enabled: true
    activation_rr: 1.0          # active le trailing apres 1x RR de profit
    atr_multiplier: 1.5         # trail a 1.5x ATR du plus haut/bas
    step_pct: 0.002             # log quand le SL bouge de > 0.2%
  # Partial take profit : ferme des fractions aux niveaux intermediaires
  partial_take_profit:
    enabled: true
    levels:
      - rr: 1.5                 # fermer 50% a 1.5x RR
        close_pct: 0.50
      - rr: 2.5                 # fermer 30% a 2.5x RR
        close_pct: 0.30
      # les 20% restants courent avec le trailing stop
  # SL/TP adaptatifs selon le regime de marche detecte
  regime_adaptation:
    enabled: true
    multipliers:
      trending_bull:
        sl_mult: 2.5            # SL large en tendance (laisser courir)
        rr_ratio: 3.0           # TP genereux
      trending_bear:
        sl_mult: 2.5
        rr_ratio: 3.0
      ranging:
        sl_mult: 1.5            # SL serre en range (capturer les rebounds)
        rr_ratio: 2.0
      volatile:
        sl_mult: 3.0            # SL tres large en volatilite (eviter le bruit)
        rr_ratio: 2.0
  position_sizing: "kelly"
  kelly_fraction: 0.25
  max_consecutive_losses: 5
  daily_loss_limit_pct: 0.05

logging:
  level: "DEBUG"
  file: "logs/bot.log"
  max_size_mb: 100
  backup_count: 10

monitoring:
  dashboard_port: 8050
  telegram_alerts: false
  discord_alerts: false
