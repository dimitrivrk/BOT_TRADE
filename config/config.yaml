# =============================================================================
# BOT TRADING CONFIG v3 — CRYPTO AI BOT (State of the Art 2025)
# =============================================================================

exchange:
  name: "bybit"            # binance | bybit | kraken | okx
  sandbox: true            # true = testnet (IMPORTANT: mettre false en prod)
  rate_limit: true
  timeout: 30000

trading:
  pairs:
    - "BTC/USDT"
    - "ETH/USDT"
    - "SOL/USDT"
  base_currency: "USDT"
  timeframes:
    primary: "1h"          # timeframe principal pour les signaux
    higher: "4h"           # confirmation higher timeframe
    lower: "15m"           # entree precise lower timeframe
  market_type: "futures"   # spot | futures
  leverage: 3              # levier max (1 = pas de levier)

capital:
  total_usdt: 10000.0
  max_position_pct: 0.15   # 15% max par position
  max_drawdown_pct: 0.20   # stoppe le bot si DD > 20%
  risk_per_trade_pct: 0.01 # risque 1% du capital par trade (Kelly)

data:
  historical_days: 730     # 2 ans d'historique
  warmup_candles: 200      # bougies de chauffe indicateurs
  storage: "sqlite"
  db_path: "data/storage/market_data.db"
  cache_dir: "data/cache"

features:
  indicators:
    trend:
      - name: "EMA"
        periods: [9, 21, 50, 200]
      - name: "SMA"
        periods: [20, 50]
      - name: "VWAP"
      - name: "SuperTrend"
        atr_period: 10
        multiplier: 3.0
    momentum:
      - name: "RSI"
        period: 14
      - name: "MACD"
        fast: 12
        slow: 26
        signal: 9
      - name: "Stochastic"
        k: 14
        d: 3
      - name: "MFI"
        period: 14
    volatility:
      - name: "BollingerBands"
        period: 20
        std: 2.0
      - name: "ATR"
        period: 14
      - name: "KeltnerChannels"
        period: 20
    volume:
      - name: "OBV"
      - name: "VWMA"
        period: 20
      - name: "CMF"
        period: 20
    patterns:
      - name: "CandlePatterns"

  advanced:
    orderbook_depth: 10
    funding_rate: true
    open_interest: true
    liquidations: true
    fear_greed_index: true

  lookback_windows: [5, 10, 20, 50, 100]
  normalization: "rolling_zscore"

models:
  # --- CryptoMamba (SSM — remplace TFT) ---
  mamba:
    enabled: true
    d_model: 128          # dimension du modele SSM
    n_layers: 4           # nombre de C-Blocks
    d_state: 16           # dimension de l'etat SSM
    d_conv: 4             # taille du noyau convolutif
    dropout: 0.1
    horizon: 6            # predire 6 pas en avant (6h)
    lookback: 168         # fenetre d'encodage (1 semaine en 1h)
    batch_size: 128
    max_epochs: 50
    learning_rate: 5e-4
    weight_decay: 1e-5
    scheduler: "cosine"
    gradient_clip: 1.0
    checkpoint_dir: "checkpoints/mamba"

  # --- TFT (fallback si Mamba non disponible) ---
  tft:
    enabled: false         # desactive par defaut (Mamba le remplace)
    hidden_size: 64
    lstm_layers: 1
    num_attention_heads: 4
    dropout: 0.1
    horizon: 6
    encoder_steps: 168
    batch_size: 128
    max_epochs: 30
    learning_rate: 1e-3
    checkpoint_dir: "checkpoints/tft"

  # --- Reinforcement Learning v3 (Ensemble SAC + PPO + DDPG) ---
  rl:
    enabled: true
    # Ensemble complet : SAC + PPO + DDPG
    ensemble_agents:
      - "SAC"              # Meilleur en haute volatilite
      - "PPO"              # Le plus stable et robuste
      - "DDPG"             # Le plus rapide, bon pour trends clairs
    # Params communs
    learning_rate: 1e-4    # lr standard pour convergence stable
    gamma: 0.99
    buffer_size: 500000    # buffer complet
    learning_starts: 5000
    tau: 0.005
    total_timesteps: 500000  # 500k steps par agent
    lookback: 20             # fenetre complete
    checkpoint_dir: "checkpoints/rl"
    n_envs: 16               # envs paralleles (SubprocVecEnv) → ~1300fps sur 31 vCPU
    eval_freq: 10000         # eval toutes les 10k steps
    n_eval_episodes: 3       # 3 episodes d'eval
    feature_extractor: "ssm" # ssm = Conv1D multi-scale (precis)
    env:
      initial_balance: 10000
      max_position_pct: 0.5
      transaction_cost: 0.001
      reward_type: "risk_aware"
      lookback: 20           # doit matcher le lookback du RL
      cvar_alpha: 0.05       # 5% tail risk pour CVaR
      cvar_lambda: 0.5       # poids de la penalite CVaR

  # --- Feature Selection (XGBoost) ---
  feature_selection:
    enabled: true
    method: "xgboost"      # xgboost | mutual_info | correlation
    n_features: 30         # nombre de features a garder
    correlation_threshold: 0.95  # supprimer features correlees > 95%
    cache_dir: "checkpoints/feature_selection"

  # --- Ensemble (combine Mamba + RL + Technique) ---
  ensemble:
    enabled: true
    method: "weighted"     # weighted | voting
    mamba_weight: 0.40     # poids CryptoMamba (prediction prix)
    rl_weight: 0.40        # poids RL Ensemble (decision)
    technical_weight: 0.20 # poids signaux techniques (confirmation)
    confidence_threshold: 0.25

backtesting:
  engine: "vectorbt"
  start_date: "2023-01-01"
  end_date: "2024-12-31"
  initial_capital: 10000.0
  commission: 0.001
  slippage: 0.0005
  metrics:
    - "total_return"
    - "sharpe_ratio"
    - "sortino_ratio"
    - "max_drawdown"
    - "calmar_ratio"
    - "win_rate"
    - "profit_factor"
    - "expectancy"
  walk_forward:
    enabled: true
    train_months: 6
    test_months: 1

risk:
  stop_loss:
    method: "atr"
    atr_multiplier: 2.0
  take_profit:
    method: "rr_ratio"
    rr_ratio: 2.5
  position_sizing: "kelly"
  kelly_fraction: 0.25
  max_consecutive_losses: 5
  daily_loss_limit_pct: 0.05

logging:
  level: "DEBUG"
  file: "logs/bot.log"
  max_size_mb: 100
  backup_count: 10

monitoring:
  dashboard_port: 8050
  telegram_alerts: false
  discord_alerts: false
